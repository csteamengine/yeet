name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="0.1.${COMMIT_COUNT}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Stamp version in config files
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          sed -i '' "s/\"version\": \"0.0.0\"/\"version\": \"${VERSION}\"/" package.json
          sed -i '' "s/^version = \"0.0.0\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app (universal binary)
        run: pnpm tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Locate artifacts
        id: artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          DMG=$(find "$BUNDLE_DIR" -name '*.dmg' | head -1)
          DMG_NAME="Yeet_${{ steps.version.outputs.version }}_universal.dmg"
          cp "$DMG" "$DMG_NAME"
          echo "dmg=${DMG_NAME}" >> "$GITHUB_OUTPUT"

          TARGZ=$(find "$BUNDLE_DIR" -name '*.tar.gz' ! -name '*.sig' | head -1)
          TARGZ_NAME="Yeet.app.tar.gz"
          cp "$TARGZ" "$TARGZ_NAME"
          echo "targz=${TARGZ_NAME}" >> "$GITHUB_OUTPUT"

          SIG=$(find "$BUNDLE_DIR" -name '*.tar.gz.sig' | head -1)
          SIGNATURE=$(cat "$SIG")
          echo "signature=${SIGNATURE}" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          SIGNATURE="${{ steps.artifacts.outputs.signature }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/csteamengine/yeet/releases/download/${TAG}/Yeet.app.tar.gz"

          cat > latest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "Automated release from commit ${{ github.sha }}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${URL}"
              }
            }
          }
          MANIFEST

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Yeet ${{ steps.version.outputs.version }}
          body: |
            Automated release from commit ${{ github.sha }}.
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.targz }}
            latest.json
          generate_release_notes: true
